<!DOCTYPE html>
<html>
<head>
	<script>
		(function() {
			const savedTheme = localStorage.getItem('theme')
			if (savedTheme === 'dark') {
				document.documentElement.classList.add('dark-theme')
			}
		})()
	</script>
    <title>Уведомления | Sendelka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Уведомления</h1>
            <div class="nav-menu">
                <a href="lenta.html" class="btn">Лента</a>
                <a href="profile.html" class="btn">Профиль</a>
                <a href="search.html" class="btn">Поиск</a>
                <button id="logoutBtn" class="btn">Выйти</button>
            </div>
        </div>

        <div class="notifications-header">
            <button id="markAllRead" class="btn">✅ Все прочитано</button>
        </div>

        <div id="notificationsList" class="notifications-list"></div>
    </div>

    <script>
        const token = localStorage.getItem('token')
        const user = JSON.parse(localStorage.getItem('user') || '{}')
        
        if (!token) location.href = '/login.html'

        async function loadNotifications() {
            const res = await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'list' })
            })

            const notifications = await res.json()
            
            if (notifications.error) {
                document.getElementById('notificationsList').innerHTML = `<p class="error">${notifications.error}</p>`
                return
            }

            const listDiv = document.getElementById('notificationsList')
            
            if (!notifications.length) {
                listDiv.innerHTML = '<p class="empty-state">Уведомлений пока нет</p>'
                return
            }

            listDiv.innerHTML = notifications.map(n => `
                <div class="notification ${n.is_read ? 'read' : 'unread'}" data-id="${n.id}">
                    <div class="notification-content">
                        ${n.type === 'like' 
                            ? `❤️ <strong>@${n.from_user_id?.username}</strong> лайкнул твой пост`
                            : `👤 <strong>@${n.from_user_id?.username}</strong> подписался на тебя`
                        }
                    </div>
                    <div class="notification-time">
                        ${new Date(n.created_at).toLocaleString()}
                    </div>
                </div>
            `).join('')

            // Отмечаем как прочитанные
            notifications.forEach(n => {
                if (!n.is_read) markAsRead(n.id)
            })
        }

        async function markAsRead(id) {
            await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'read', notificationId: id })
            })
        }

        document.getElementById('markAllRead').onclick = async () => {
            await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'readAll' })
            })
            
            document.querySelectorAll('.notification').forEach(n => {
                n.classList.remove('unread')
                n.classList.add('read')
            })
        }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear()
            location.href = '/'
        }

        loadNotifications()
    </script>
</body>
</html>
