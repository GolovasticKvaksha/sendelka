<!DOCTYPE html>
<html>
<head>
    <title>Уведомления | Sendelka</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme')
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme')
            }
        })()
    </script>
</head>
<body>
    <div class="container">
        <div class="notifications-header">
            <h1>🔔 Уведомления</h1>
            
            <!-- ВЕРХНЯЯ НАВИГАЦИЯ (ДЛЯ ПК) -->
            <div class="top-nav">
                <a href="lenta.html" class="btn">Лента</a>
                <a href="profile.html" class="btn">Профиль</a>
                <a href="search.html" class="btn">Поиск</a>
                <a href="top.html" class="btn">Топы</a>
                <a href="create.html" class="btn">Создать</a>
            </div>

            <!-- НИЖНЯЯ НАВИГАЦИЯ (ДЛЯ ТЕЛЕФОНА) -->
            <div class="bottom-nav">
                <a href="lenta.html" class="nav-item">
                    <span class="nav-icon">📰</span>
                    <span class="nav-label">Лента</span>
                </a>
                <a href="profile.html" class="nav-item">
                    <span class="nav-icon">👤</span>
                    <span class="nav-label">Профиль</span>
                </a>
                <a href="search.html" class="nav-item">
                    <span class="nav-icon">🔍</span>
                    <span class="nav-label">Поиск</span>
                </a>
                <a href="top.html" class="nav-item">
                    <span class="nav-icon">🏆</span>
                    <span class="nav-label">Топы</span>
                </a>
                <a href="create.html" class="nav-item">
                    <span class="nav-icon">➕</span>
                    <span class="nav-label">Создать</span>
                </a>
                <a href="#" class="nav-item" id="themeToggle">
                    <span class="nav-icon">🌙</span>
                    <span class="nav-label">Тема</span>
                </a>
            </div>

            <!-- ПЛАВАЮЩАЯ КНОПКА ВЫХОДА -->
            <button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
        </div>

        <!-- ЗАГОЛОВОК СТРАНИЦЫ -->
        <div class="page-header">
            <h2>Последние события</h2>
            <button id="markAllRead" class="btn btn-small">✅ Все прочитано</button>
        </div>

        <!-- СПИСОК УВЕДОМЛЕНИЙ -->
        <div id="notificationsList" class="notifications-list">
            <!-- Уведомления подгрузятся сюда -->
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token')
        const user = JSON.parse(localStorage.getItem('user') || '{}')
        
        if (!token) location.href = '/login.html'

        async function loadNotifications() {
            const res = await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'list' })
            })

            const notifications = await res.json()
            
            if (notifications.error) {
                document.getElementById('notificationsList').innerHTML = `<div class="error">${notifications.error}</div>`
                return
            }

            const listDiv = document.getElementById('notificationsList')
            
            if (!notifications.length) {
                listDiv.innerHTML = `
                    <div class="empty-notifications">
                        <div class="empty-icon">🔔</div>
                        <h3>Уведомлений пока нет</h3>
                        <p>Здесь будут появляться новые события</p>
                    </div>
                `
                return
            }

            listDiv.innerHTML = notifications.map(n => {
                // Определяем иконку по типу
                let icon = '📌'
                switch(n.type) {
                    case 'like': icon = '❤️'; break
                    case 'subscribe': icon = '👤'; break
                    case 'referral': icon = '🔗'; break
                    case 'avatar': icon = '🖼️'; break
                    case 'medal': icon = '🏅'; break
                }
                
                return `
                    <div class="notification-item ${n.is_read ? 'read' : 'unread'}" data-id="${n.id}">
                        <div class="notification-icon">${icon}</div>
                        <div class="notification-content">
                            <div class="notification-text">${n.content || 'Новое уведомление'}</div>
                            <div class="notification-time">${new Date(n.created_at).toLocaleString()}</div>
                        </div>
                        ${!n.is_read ? '<span class="notification-dot"></span>' : ''}
                    </div>
                `
            }).join('')

            // Автоматически отмечаем прочитанными
            notifications.forEach(n => {
                if (!n.is_read) markAsRead(n.id)
            })
        }

        async function markAsRead(id) {
            await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'read', notificationId: id })
            })
        }

        document.getElementById('markAllRead').onclick = async () => {
            await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'readAll' })
            })
            
            document.querySelectorAll('.notification-item').forEach(n => {
                n.classList.remove('unread')
                n.classList.add('read')
            })
        }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear()
            location.href = '/'
        }

        function initTheme() {
            const themeBtn = document.getElementById('themeToggle')
            if (!themeBtn) return
            
            const isDark = document.documentElement.classList.contains('dark-theme')
            themeBtn.innerHTML = isDark ? 
                '<span class="nav-icon">☀️</span><span class="nav-label">Светлая</span>' : 
                '<span class="nav-icon">🌙</span><span class="nav-label">Тёмная</span>'
            
            themeBtn.onclick = (e) => {
                e.preventDefault()
                document.documentElement.classList.toggle('dark-theme')
                const nowDark = document.documentElement.classList.contains('dark-theme')
                localStorage.setItem('theme', nowDark ? 'dark' : 'light')
                themeBtn.innerHTML = nowDark ? 
                    '<span class="nav-icon">☀️</span><span class="nav-label">Светлая</span>' : 
                    '<span class="nav-icon">🌙</span><span class="nav-label">Тёмная</span>'
            }
        }

        loadNotifications()
        initTheme()
    </script>
</body>
</html>
