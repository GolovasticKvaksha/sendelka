<!DOCTYPE html>
<html>
<head>
	<script>
		(function() {
			const savedTheme = localStorage.getItem('theme')
			if (savedTheme === 'dark') {
				document.documentElement.classList.add('dark-theme')
			}
		})()
	</script>
    <title>Лента | Sendelka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
	
		<div class="stats-header">
			<div class="user-counter">
				🟢 ВСЕГО НАС: <span id="totalUsers">...</span>
			</div>
		</div>
		
        <div class="header">
            <h1>📦 Лента</h1>
            <div class="nav-menu">
                <a href="create.html" class="btn">Новый пост</a>
                <a href="profile.html" class="btn">Мой профиль</a>
                <a href="search.html" class="btn">Поиск</a>
                <button id="logoutBtn" class="btn">Выйти</button>
            </div>
        </div>

        <div id="notificationsBell" class="notifications-bell" style="cursor: pointer;">
            <span id="notificationsCount" class="notifications-count">0</span>
            🔔
        </div>

        <div class="feed-filter">
            <button id="filterAll" class="filter-btn active">Все посты</button>
            <button id="filterSubs" class="filter-btn">Мои подписки</button>
        </div>

        <div id="posts" class="posts"></div>
		<div class="load-more-container">
			<div id="loadingSpinner" class="spinner" style="display: none;">Загрузка...</div>
			<button id="loadMoreBtn" class="btn load-more-btn">Ещё 8 постов</button>
		</div>
    </div>

    <script>
        const token = localStorage.getItem('token')
        const user = JSON.parse(localStorage.getItem('user') || '{}')
        
        if (!token) location.href = '/login.html'

        let currentFilter = 'all'
        let currentOffset = 0
        let hasMore = true
        let isLoading = false

        async function loadPosts(reset = false) {
			if (isLoading) return
			if (reset) {
				currentOffset = 0
				hasMore = true
				document.getElementById('posts').innerHTML = ''
				document.getElementById('loadMoreBtn').style.display = 'block'
			}
			
			if (!hasMore) {
				document.getElementById('loadMoreBtn').style.display = 'none'
				return
			}

			isLoading = true
			document.getElementById('loadingSpinner').style.display = 'block'

			try {
				// Загружаем посты
				const res = await fetch('/api/posts', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({
						action: 'feed',
						userId: user.id,
						filter: currentFilter,
						limit: 8,
						offset: currentOffset
					})
				})
				
				const data = await res.json()
				
				if (data.error) {
					document.getElementById('posts').innerHTML = `<p>Ошибка: ${data.error}</p>`
					return
				}

				const posts = data.posts || []
				hasMore = data.hasMore || false

				// ===== ЗАГРУЖАЕМ ПОДПИСКИ ПОЛЬЗОВАТЕЛЯ =====
				let subscribedUserIds = new Set()
				try {
					const subsRes = await fetch('/api/user', {
						method: 'POST',
						headers: {
							'Content-Type': 'application/json',
							'Authorization': `Bearer ${token}`
						},
						body: JSON.stringify({
							action: 'get_subscriptions'
						})
					})
					const subsData = await subsRes.json()
					
					if (!subsData.error && subsData.subscriptions) {
						subscribedUserIds = new Set(subsData.subscriptions.map(s => s.following_id))
						console.log('Подписки загружены:', Array.from(subscribedUserIds)) // для отладки
					}
				} catch (err) {
					console.error('Ошибка загрузки подписок:', err)
				}
				
				// Добавляем флаг isSubscribed к каждому посту
				const postsWithSubs = posts.map(post => ({
					...post,
					isSubscribed: subscribedUserIds.has(post.user_id)
				}))
				
				// Отрисовываем посты
				if (reset) {
					document.getElementById('posts').innerHTML = renderPosts(postsWithSubs)
				} else {
					document.getElementById('posts').innerHTML += renderPosts(postsWithSubs)
				}

				currentOffset += 8
				document.getElementById('loadMoreBtn').style.display = hasMore ? 'block' : 'none'
				
				// Добавляем обработчики для всех кнопок
				document.querySelectorAll('.like-btn').forEach(btn => btn.addEventListener('click', likePost))
				document.querySelectorAll('.delete-post-btn').forEach(btn => btn.addEventListener('click', deletePost))
				document.querySelectorAll('.subscribe-btn-inline').forEach(btn => btn.addEventListener('click', subscribeFromFeed))
				
			} catch (err) {
				console.error('Ошибка загрузки:', err)
			} finally {
				isLoading = false
				document.getElementById('loadingSpinner').style.display = 'none'
			}
		}
        function renderPosts(posts) {
			if (!posts.length) return ''

			return posts.map(post => {
				const subscribeBtnText = post.isSubscribed ? '✓ Подписан' : '+ Подписаться'
				const subscribeBtnClass = post.isSubscribed ? 'subscribe-btn-inline subscribed' : 'subscribe-btn-inline'
				
				// Добавляем блок с фото, если есть
				const photoHtml = post.image_url ? `
					<div class="post-image">
						<img src="${post.image_url}" alt="post image" class="post-img" loading="lazy">
					</div>
				` : ''
				
				return `
					<div class="post" data-post-id="${post.id}" data-user-id="${post.user_id}">
						<div class="post-header">
							<div class="post-author-line">
								<div class="post-author-row">
									<a href="profile.html?username=${post.users?.username}" class="post-author">
										<strong>@${post.users?.username}</strong>
										${post.users?.is_admin ? '<span class="admin-badge" title="Администратор">✓</span>' : ''}
									</a>
									<span class="post-date">${new Date(post.created_at).toLocaleString()}</span>
								</div>
								${post.user_id !== user.id ? `
									<div class="subscribe-row">
										<button class="${subscribeBtnClass}" 
												data-user-id="${post.user_id}">
											${subscribeBtnText}
										</button>
									</div>
								` : ''}
							</div>
							${(user.is_admin || post.user_id === user.id) ? `
								<button class="delete-post-btn" data-post-id="${post.id}" title="Удалить пост">🗑️</button>
							` : ''}
						</div>
						<div class="post-content">${post.content}</div>
						${photoHtml}
						<div class="post-actions">
							<button class="like-btn ${post.isLiked ? 'liked' : ''}" data-post-id="${post.id}">
								❤️ <span class="likes-count">${post.likes_count || 0}</span>
							</button>
							<span class="views-count">👁️ ${post.views_count || 0}</span>
						</div>
					</div>
				`
			}).join('')
		}


        async function likePost(e) {
            const btn = e.currentTarget
            const postId = btn.dataset.postId
            const likesSpan = btn.querySelector('.likes-count')
            
            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    action: 'like',
                    postId: parseInt(postId)
                })
            })

            const data = await res.json()
            
            if (!data.error) {
                btn.classList.toggle('liked', data.liked)
                likesSpan.textContent = parseInt(likesSpan.textContent) + (data.liked ? 1 : -1)
                loadNotificationsCount()
            }
        }

        async function deletePost(e) {
            if (!confirm('Удалить пост?')) return
            
            const btn = e.currentTarget
            const postId = btn.dataset.postId
            
            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    action: 'delete',
                    postId: parseInt(postId)
                })
            })

            const data = await res.json()
            
            if (data.success) {
                btn.closest('.post').remove()
            } else {
                alert('Ошибка: ' + (data.error || 'Неизвестная ошибка'))
            }
        }
		async function subscribeFromFeed(e) {
			const btn = e.currentTarget
			const targetUserId = parseInt(btn.dataset.userId)
			const postId = btn.dataset.postId
			
			// Блокируем кнопку на время запроса
			const originalText = btn.textContent
			btn.disabled = true
			btn.textContent = '...'
			
			try {
				const res = await fetch('/api/user', {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Authorization': `Bearer ${token}`
					},
					body: JSON.stringify({
						action: 'subscribe',
						targetUserId: targetUserId
					})
				})
				
				const data = await res.json()
				
				if (!data.error) {
					if (data.subscribed) {
						btn.textContent = '✓ Подписан'
						btn.classList.remove('subscribe-btn-inline')
						btn.classList.add('subscribe-btn-inline', 'subscribed')
					} else {
						btn.textContent = '+ Подписаться'
						btn.classList.remove('subscribed')
					}
					
					// Обновляем флаг isSubscribed для всех постов этого пользователя
					document.querySelectorAll(`.post[data-user-id="${targetUserId}"] .subscribe-btn-inline`).forEach(otherBtn => {
						if (data.subscribed) {
							otherBtn.textContent = '✓ Подписан'
							otherBtn.classList.add('subscribed')
						} else {
							otherBtn.textContent = '+ Подписаться'
							otherBtn.classList.remove('subscribed')
						}
					})
					
					// Обновляем счетчик подписчиков в профиле (если открыт)
					const subsCount = document.getElementById('subscribersCount')
					if (subsCount) {
						subsCount.textContent = parseInt(subsCount.textContent) + (data.subscribed ? 1 : -1)
					}
				} else {
					btn.textContent = originalText
					alert('Ошибка: ' + data.error)
				}
			} catch (err) {
				btn.textContent = originalText
				alert('Ошибка соединения')
			}
			
			btn.disabled = false
		}
        async function loadNotificationsCount() {
            const res = await fetch('/api/notifications', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ action: 'count' })
            })
            
            const data = await res.json()
            
            const countSpan = document.getElementById('notificationsCount')
            if (data.count > 0) {
                countSpan.textContent = data.count
                countSpan.style.display = 'inline'
            } else {
                countSpan.style.display = 'none'
            }
        }

        async function loadTotalUsers() {
            try {
                const res = await fetch('/api/user', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'total_users' })
                })
                
                const data = await res.json()
                
                if (!data.error) {
                    document.getElementById('totalUsers').textContent = data.total
                }
            } catch (err) {
                console.error('Ошибка счетчика:', err)
            }
        }

        // Добавляем обработчики событий после загрузки постов
        function addEventListeners() {
            document.querySelectorAll('.like-btn').forEach(btn => {
                btn.addEventListener('click', likePost)
            })

            document.querySelectorAll('.delete-post-btn').forEach(btn => {
                btn.addEventListener('click', deletePost)
            })
        }

        // Переопределяем renderPosts чтобы добавлять обработчики
        const originalRenderPosts = renderPosts
        renderPosts = function(posts) {
            const html = originalRenderPosts(posts)
            setTimeout(addEventListeners, 0) // Добавляем обработчики после вставки в DOM
            return html
        }

        document.getElementById('filterAll').onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'))
            document.getElementById('filterAll').classList.add('active')
            currentFilter = 'all'
            loadPosts(true)
        }

        document.getElementById('filterSubs').onclick = () => {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'))
            document.getElementById('filterSubs').classList.add('active')
            currentFilter = 'subscriptions'
            loadPosts(true)
        }

        document.getElementById('loadMoreBtn').onclick = () => loadPosts()

        document.getElementById('logoutBtn').onclick = async () => {
            await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'logout' })
            })
            localStorage.clear()
            location.href = '/'
        }

        document.getElementById('notificationsBell').onclick = () => {
            location.href = '/notifications.html'
        }

        // Инициализация
        loadPosts(true)
        loadNotificationsCount()
        loadTotalUsers()
        setInterval(loadNotificationsCount, 30000)
    </script>
</body>
</html>
