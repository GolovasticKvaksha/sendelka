<!DOCTYPE html>
<html>
<head>
	<script>
		(function() {
			const savedTheme = localStorage.getItem('theme')
			if (savedTheme === 'dark') {
				document.documentElement.classList.add('dark-theme')
			}
		})()
	</script>
    <title>Новый пост | Sendelka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Создать пост</h1>
            <div class="nav-menu">
                <a href="lenta.html" class="btn">Лента</a>
                <a href="profile.html" class="btn">Профиль</a>
                <a href="search.html" class="btn">Поиск</a>
                <button id="logoutBtn" class="btn">Выйти</button>
            </div>
        </div>

        <form id="postForm">
            <div class="textarea-wrapper">
                <textarea 
                    id="content" 
                    placeholder="Что хочешь написать? (максимум 600 символов)" 
                    rows="6" 
                    required
                    class="post-input"
                    maxlength="600"
                ></textarea>
				<!-- БЛОК ДЛЯ ФОТО (ТОЛЬКО ДЛЯ АДМИНОВ) -->
				<div id="photoSection" class="photo-section">
					<label class="photo-label">📷 Прикрепить фото (только для админов):</label>
					<input type="url" id="imageUrl" class="photo-input" 
						   placeholder="https://... (только .jpg, .png, .gif, .webp)">
						   
						<div class="photo-tip">
							<p>🔗 Нужно загрузить фото? Используй <a href="https://imgfy.ru/" target="_blank" rel="noopener noreferrer">imgfy.ru</a>
						</div>
							   
					<div id="photoPreview" class="photo-preview"></div>
				</div>
                <div id="charCounter" class="char-counter">
                    <span id="currentChars">0</span>/600
                </div>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Опубликовать</button>
                <a href="lenta.html" class="btn">Отмена</a>
            </div>
        </form>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>
    </div>

    <script>
        const token = localStorage.getItem('token')
        const user = JSON.parse(localStorage.getItem('user') || '{}')
        
        if (!token) location.href = '/login.html'
		
		
        const contentInput = document.getElementById('content')
        const charCounter = document.getElementById('currentChars')
        const errorDiv = document.getElementById('error')
        const successDiv = document.getElementById('success')
        const submitBtn = document.querySelector('button[type="submit"]')
		const imageUrlInput = document.getElementById('imageUrl')
		
        if (imageUrlInput) {
            imageUrlInput.addEventListener('input', function(e) {
                const url = e.target.value
                const preview = document.getElementById('photoPreview')
                
                if (url && url.match(/\.(jpeg|jpg|gif|png|webp)(\?.*)?$/i)) {
                    preview.innerHTML = `<img src="${url}" class="photo-preview-img" alt="preview">`
                } else {
                    preview.innerHTML = ''
                }
            })
        }
        contentInput.addEventListener('input', () => {
            const length = contentInput.value.length
            charCounter.textContent = length
            
            const counter = document.getElementById('charCounter')
            if (length > 550) counter.style.color = '#ff4444'
            else if (length > 500) counter.style.color = '#ff8800'
            else counter.style.color = '#666'
        })

        document.getElementById('postForm').onsubmit = async (e) => {
            e.preventDefault()
            
            const content = contentInput.value.trim()
            
            if (!content) {
                errorDiv.textContent = 'Пост не может быть пустым'
                return
            }

            if (content.length > 600) {
                errorDiv.textContent = `Максимум 600 символов (сейчас ${content.length})`
                return
            }
			
			// ⬇️ ДОБАВЛЯЕМ ФОТО В ЗАПРОС (ЕСЛИ ЕСТЬ) ⬇️
            const imageUrl = document.getElementById('imageUrl')?.value || ''
			
            submitBtn.disabled = true
            submitBtn.textContent = 'Публикация...'
            errorDiv.textContent = ''
            successDiv.textContent = ''

            const res = await fetch('/api/posts', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    action: 'create',
                    content,
					imageUrl: imageUrl || undefined  // ← добавляем фото
                })
            })

            const data = await res.json()

            if (!data.error) {
                successDiv.textContent = 'Пост опубликован!'
                contentInput.value = ''
                charCounter.textContent = '0'
				if (imageUrlInput) imageUrlInput.value = ''  // очищаем поле фото
				document.getElementById('photoPreview').innerHTML = ''  // очищаем превью
                setTimeout(() => location.href = '/lenta.html', 1500)
            } else {
                errorDiv.textContent = data.error
                submitBtn.disabled = false
                submitBtn.textContent = 'Опубликовать'
            }
        }

        document.getElementById('logoutBtn').onclick = () => {
            localStorage.clear()
            location.href = '/'
        }
    </script>
</body>
</html>
