<!DOCTYPE html>
<html>
<head>
    <title>Регистрация | Sendelka</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme')
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-theme')
            }
        })()
    </script>
</head>
<body>
    <div class="container">
        <h1>📦 Регистрация</h1>
        <form id="registerForm">
            <input type="text" id="username" placeholder="Никнейм" minlength="3" required>
            <input type="password" id="password" placeholder="Пароль" minlength="4" required>
            
            <!-- НОВОЕ ПОЛЕ: РЕФЕРАЛ -->
            <input type="text" id="referrer" placeholder="Кто пригласил? (необязательно)">
            <small class="field-note">Если вас кто-то пригласил — введите его ник</small>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p>Есть аккаунт? <a href="login.html">Войти</a></p>
        <div id="error" class="error"></div>
    </div>

    <script>
        document.getElementById('registerForm').onsubmit = async (e) => {
            e.preventDefault()
            
            const username = document.getElementById('username').value
            const password = document.getElementById('password').value
            const referrer = document.getElementById('referrer').value.trim()
            
            const res = await fetch('/api/referrals', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    action: 'register',
                    username,
                    password,
                    referrerUsername: referrer || undefined
                })
            })
            
            const data = await res.json()
            
            if (data.success) {
                alert('Регистрация успешна! Теперь войдите.')
                location.href = '/login.html'
            } else {
                document.getElementById('error').textContent = data.error
            }
        }
    </script>
</body>
</html>
