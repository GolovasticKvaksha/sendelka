<!DOCTYPE html>
<html>
<head>
	<script>
		(function() {
			const savedTheme = localStorage.getItem('theme')
			if (savedTheme === 'dark') {
				document.documentElement.classList.add('dark-theme')
			}
		})()
	</script>
    <title>Поиск | Sendelka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📦 Поиск пользователей</h1>
            <!-- ВЕРХНЯЯ НАВИГАЦИЯ (ДЛЯ ПК) -->
			<div class="top-nav">
				<a href="lenta.html" class="btn">Лента</a>
				<a href="profile.html" class="btn">Профиль</a>
				<a href="search.html" class="btn">Поиск</a>
				<a href="top.html" class="btn">Топы</a>
				<a href="create.html" class="btn">Создать</a>
			</div>

			<!-- НИЖНЯЯ НАВИГАЦИЯ (ДЛЯ ТЕЛЕФОНА) -->
			<div class="bottom-nav">
				<a href="lenta.html" class="nav-item">
					<span class="nav-icon">📰</span>
					<span class="nav-label">Лента</span>
				</a>
				<a href="profile.html" class="nav-item">
					<span class="nav-icon">👤</span>
					<span class="nav-label">Профиль</span>
				</a>
				<a href="search.html" class="nav-item">
					<span class="nav-icon">🔍</span>
					<span class="nav-label">Поиск</span>
				</a>
				<a href="top.html" class="nav-item">
					<span class="nav-icon">🏆</span>
					<span class="nav-label">Топы</span>
				</a>
				<a href="create.html" class="nav-item">
					<span class="nav-icon">➕</span>
					<span class="nav-label">Создать</span>
				</a>
			</div>
			<div class="search-header">
				<h1>🔍 Поиск</h1>
				<p>Найди друзей по точному никнейму</p>
			</div>

			<div class="search-box">
				<div class="search-input-wrapper">
					<span class="search-icon">🔍</span>
					<input 
						type="text" 
						id="searchInput" 
						placeholder="Введите никнейм..."
						autocomplete="off"
					>
				</div>
				<button id="searchBtn" class="search-btn">🔍</button>
			</div>

			<div id="result" class="search-results">
				<!-- Результаты поиска -->
			</div>


			<!-- ПЛАВАЮЩАЯ КНОПКА ВЫХОДА -->
			<button id="logoutBtn" class="logout-btn" title="Выйти">🚪</button>
        </div>

    </div>

	<script>
		const token = localStorage.getItem('token')
		const user = JSON.parse(localStorage.getItem('user') || '{}')
		
		if (!token) {
			location.href = '/login.html'
		}

		const searchInput = document.getElementById('searchInput')
		const searchBtn = document.getElementById('searchBtn')
		const resultDiv = document.getElementById('result')

		async function searchUser() {
			const username = searchInput.value.trim()
			
			if (!username) {
				resultDiv.innerHTML = '<div class="search-error">Введите никнейм</div>'
				return
			}

			resultDiv.innerHTML = '<div class="search-loading">🔍 Ищем...</div>'

			try {
				const res = await fetch('/api/search', {
					method: 'POST',
					headers: { 'Content-Type': 'application/json' },
					body: JSON.stringify({ username })
				})

				const data = await res.json()

				if (data.error) {
					resultDiv.innerHTML = `<div class="search-error">❌ ${data.error}</div>`
					return
				}

				resultDiv.innerHTML = `
					<div class="search-user-card">
						<div class="search-user-header">
							<img src="${data.avatar?.startsWith('avatar') ? '/avatars/' + data.avatar : data.avatar || '/avatars/avatar1.jpg'}" 
								 class="search-user-avatar"
								 onerror="this.src='/avatars/avatar1.jpg'">
							<div class="search-user-info">
								<div class="search-user-name">
									<h3>@${data.username}</h3>
									${data.is_admin ? '<span class="admin-badge">✓</span>' : ''}
								</div>
								<div class="search-user-date">
									На сайте с ${new Date(data.created_at).toLocaleDateString()}
								</div>
							</div>
						</div>
						
						<div class="search-user-stats">
							<div class="search-stat-item">
								<span class="search-stat-value">${data.posts_count || 0}</span>
								<span class="search-stat-label">постов</span>
							</div>
							<div class="search-stat-item">
								<span class="search-stat-value">${data.subscribers_count || 0}</span>
								<span class="search-stat-label">подписчиков</span>
							</div>
							<div class="search-stat-item">
								<span class="search-stat-value">${data.total_likes_received || 0}</span>
								<span class="search-stat-label">лайков</span>
							</div>
						</div>

						<a href="profile.html?username=${data.username}" class="search-profile-btn">
							👤 Перейти в профиль
						</a>
					</div>
				`
			} catch (err) {
				resultDiv.innerHTML = '<div class="search-error">❌ Ошибка соединения</div>'
			}
		}

		searchBtn.onclick = searchUser
		searchInput.onkeypress = (e) => {
			if (e.key === 'Enter') searchUser()
		}

		initTheme()
	</script>
</body>
</html>
